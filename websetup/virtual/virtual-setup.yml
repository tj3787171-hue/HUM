---
virtual_setup_version: 1
phase: virtual
description: >
  Declarative virtual setup configuration layered on top of the hum-dev-netns
  network namespace workflow and SDV checks.

references:
  sdv_manifest: "../sdv/manifest.json"
  netns_script: "../../scripts/hum-dev-netns.sh"

defaults:
  gateway_v4: "10.200.0.1"
  dns_v4:
    - "1.1.1.1"
    - "8.8.8.8"
  timezone: "America/Chicago"

namespaces:
  penguin:
    description: "Chromebook Crostini Linux container (penguin)"
    segment: dev-ns
    dns_v4:
      - "209.18.47.61"
      - "209.18.47.62"
    veth_pair:
      host_side: "penguin-veth0"
      ns_side: "penguin-peer0"
    gateway: "192.168.68.51"
    ip_address: "192.168.68.52"

segments:
  core:
    cidr: "10.200.0.0/30"
    description: "Primary proxy namespace path"
  peer:
    cidr: "10.200.1.0/30"
    description: "Peer-chain namespace path"
  lan:
    cidr: "192.168.68.0/24"
    description: "Local physical laptop/home LAN segment"
  dev-ns:
    cidr: "192.168.68.0/22"
    description: "IP tools and utilities dev namespace subnet via router 192.168.68.51"

nodes:
  - id: hum-proxy
    profile: minimal
    segment: core
    ip_hint: "10.200.0.2"
    role: "proxy-namespace"
  - id: hum-peer
    profile: dev
    segment: peer
    ip_hint: "10.200.1.2"
    role: "peer-namespace"
  - id: local-laptop-dev
    profile: dev
    segment: lan
    ip_hint: "192.168.68.x"
    role: "developer-laptop"
  - id: penguin
    profile: dev
    segment: dev-ns
    ip_hint: "192.168.68.52"
    role: "chromebook-linux"
    dns_v4:
      - "209.18.47.61"
      - "209.18.47.62"
    veth_pair:
      host: "penguin-veth0"
      peer: "penguin-peer0"
    gateway: "192.168.68.51"
  - id: router-68-51
    profile: infra
    segment: lan
    ip_hint: "192.168.68.51"
    role: "home-router"
    dns_v4:
      - "209.18.47.61"
      - "209.18.47.62"

stacks: []
hooks:
  before_apply:
    - "bash scripts/hum-dev-netns.sh status"
  apply:
    - "sudo bash scripts/hum-dev-netns.sh up"
  after_apply:
    - "sudo bash scripts/hum-dev-netns.sh trace"
